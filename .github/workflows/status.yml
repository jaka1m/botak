name: 🌐 Update Proxy IP Status

on:
  # Schedule workflow to run every 3 days at midnight
  schedule:
    - cron: '0 0 */3 * *'
  # Allow manual trigger of the workflow
  workflow_dispatch:

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    name: 🚀 Update Proxy IP Status

    steps:
    # Step 1: Checkout the repository
    - name: 📂 Checkout Repository
      uses: actions/checkout@v3

    # Step 2: Set up Python environment
    - name: 🐍 Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    # Step 3: Install Python dependencies
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # Step 4: Create necessary directories
    - name: 📁 Create Directories
      run: |
        mkdir -p cek

    # Step 5: Run the Python script to update proxy status
    - name: 🔄 Update Proxy Status
      run: |
        python update_proxy_status.py

    # Step 6: Commit and push changes if any
    - name: 📤 Commit and Push Changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add files to staging
        git add cek/proxyList.txt cek/dead.txt 2>/dev/null || true
        
        # Check if there are changes
        if git diff --cached --quiet; then
          echo "✅ Tidak ada perubahan yang perlu di-commit"
        else
          git commit -m "🔄 Update proxy IP status - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
          echo "✅ Perubahan berhasil di-push ke repository"
        fi
