name: 🌐 Update Proxy IP Status

on:
  schedule:
    - cron: '0 0 */3 * *' # Setiap 3 hari sekali
  workflow_dispatch: # Bisa dijalankan manual

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout Repository
      uses: actions/checkout@v3

    - name: 🐍 Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp  # WAJIB untuk script async

    - name: 🔄 Update Proxy Status
      run: |
        python ./cek/scan.py

    - name: 📤 Commit and Push Changes
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"

        # Menambahkan file hasil ke staging
        git add cek/proxyList.txt || true
        git add cek/dead.txt || true

        # Commit hanya jika ada perubahan isi file
        if git diff --cached --quiet; then
          echo "✅ Tidak ada perubahan status proxy."
        else
          git commit -m "🔄 Auto Update Proxy Status [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
          echo "🚀 Berhasil update repository."
        fi
